<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Varkitekt — desktop tree editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Varkitekt is a desktop tree editor for sketching file and folder architectures — drag, annotate, copy as an ASCII tree, paste anywhere.">
<meta property="og:title" content="Varkitekt">
<meta property="og:description" content="Desktop tree editor for sketching file and folder architectures.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://varkitekt.com">
<meta name="theme-color" content="#04020D">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="assets/icon.png">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #050212;
    overflow: hidden;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    width: 100%;
    height: 100%;
  }
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: crosshair;
    background: #050212;
  }
  .shader-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }
  .skyline {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .skyline-windows {
    z-index: 4;
  }
  .skyline-windows .bldg {
    background: transparent !important;
    border-top-color: transparent !important;
  }
  .skyline-windows .bldg::before {
    background: transparent !important;
    border-top-color: transparent !important;
  }
  .skyline-windows .bldg .ant,
  .skyline-windows .bldg .dome,
  .skyline-windows .bldg .peak {
    display: none;
  }
  .skyline-windows .bldg .win {
    background: #050212 !important;
    border-color: rgba(255,255,255,0.22) !important;
  }
  .row {
    position: absolute;
    left: 0;
    right: 0;
    height: var(--h);
    top: var(--top);
    display: flex;
    align-items: stretch;
    justify-content: var(--justify);
    will-change: transform;
    transform: translateX(var(--ix, 0px));
  }
  .row.left { --justify: flex-start; }
  .row.right { --justify: flex-end; }
  .strip { display: flex; align-items: flex-end; gap: 0; height: 100%; }
  .row.left .strip { flex-direction: row; }
  .row.right .strip { flex-direction: row-reverse; }

  .bldg {
    position: relative;
    flex-shrink: 0;
    background: var(--fg, #050212);
    border-top: 2px solid var(--edge, #050212);
    height: var(--bh, 80%);
    width: var(--bw, 120px);
  }
  .bldg.notch-top::before {
    content: "";
    position: absolute;
    top: -18px;
    background: var(--fg);
    border-top: 2px solid var(--edge);
    height: 18px;
  }
  .bldg.notch-top.nl::before { left: 0; width: 40%; }
  .bldg.notch-top.nr::before { right: 0; width: 40%; }
  .bldg.notch-top.nm::before { left: 30%; width: 40%; }
  .bldg .ant {
    position: absolute;
    top: -28px; left: 50%;
    width: 2px; height: 26px;
    background: var(--edge);
  }
  .bldg .ant.off { left: 75%; }
  .bldg .dome {
    position: absolute;
    top: -16px; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 16px;
    background: var(--fg);
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    border-top: 2px solid var(--edge);
    border-left: 2px solid var(--edge);
    border-right: 2px solid var(--edge);
    box-sizing: border-box;
  }
  .bldg .peak {
    position: absolute;
    top: -12px;
    width: 0; height: 0;
    border-left: var(--pw, 16px) solid transparent;
    border-right: var(--pw, 16px) solid transparent;
    border-bottom: 12px solid var(--fg);
    left: 50%;
    transform: translateX(-50%);
  }
  .bldg .win {
    position: absolute;
    background: var(--win, rgba(255,255,255,0));
    border: 1.5px solid var(--edge);
    box-sizing: border-box;
  }

  .wordmark {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    text-align: center;
    font-family: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(120px, 17vw, 340px);
    line-height: 0.82;
    letter-spacing: -0.055em;
    color: #ffffff;
    mix-blend-mode: difference;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    padding: 0 40px;
    font-variant-ligatures: none;
  }

  /* ───────── sibling UI surface: credit + CTA ─────────
     Per design system, the wallpaper canvas stays clean. UI sits in floating
     corner panels that don't touch the main composition.
  */
  .credit,
  .cta {
    position: absolute;
    z-index: 10;
  }

  .credit {
    left: 20px;
    bottom: 20px;
    max-width: min(560px, calc(100vw - 220px));
    padding: 14px 16px;
    background: rgba(4, 2, 13, 0.62);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: rgba(255, 255, 255, 0.82);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.55;
  }
  .credit-brand {
    display: inline-block;
    color: #FFD173;
    font-family: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin-right: 8px;
  }
  .credit p {
    margin: 0;
  }
  .credit p + p {
    margin-top: 8px;
  }
  .credit a {
    color: #1AC7EB;
    text-decoration: none;
    border-bottom: 1px dashed rgba(26, 199, 235, 0.4);
    transition: color 0.12s, border-color 0.12s;
  }
  .credit a:hover {
    color: #ffffff;
    border-bottom-color: #ffffff;
  }
  .credit-sep {
    color: rgba(255, 255, 255, 0.28);
    margin: 0 6px;
  }
  .credit-by {
    color: rgba(255, 255, 255, 0.5);
  }

  .cta {
    right: 20px;
    bottom: 20px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 22px 13px;
    background: #1AC7EB;
    color: #04020D;
    font-family: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid rgba(4, 2, 13, 0.25);
    transition: background 0.15s, transform 0.15s, color 0.15s;
  }
  .cta:hover {
    background: #ffffff;
    transform: translateY(-2px);
  }
  .cta-arrow {
    font-size: 15px;
    line-height: 1;
  }
  .cta-sub {
    display: block;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0;
    text-transform: none;
    color: rgba(4, 2, 13, 0.6);
    margin-top: 2px;
  }

  @media (max-width: 680px) {
    .credit {
      left: 12px;
      right: 12px;
      bottom: 80px;
      max-width: none;
    }
    .cta {
      right: 12px;
      bottom: 12px;
      padding: 12px 16px 11px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>
<div class="stage" data-shader="liquid">
  <canvas class="shader-canvas"></canvas>
  <div class="wordmark">VARKITEKT</div>
  <div class="skyline" data-skyline="2"></div>
</div>

<aside class="credit" aria-label="About Varkitekt">
  <p>
    <span class="credit-brand">Varkitekt</span>
    <span>is a desktop tree editor for sketching file and folder architectures — drag nodes, annotate, then copy out an ASCII tree to paste into your editor or an LLM prompt.</span>
  </p>
  <p>
    <a href="https://github.com/HammerCreativeLLC/varkitekt" target="_blank" rel="noopener">github.com/HammerCreativeLLC/varkitekt</a>
    <span class="credit-sep">·</span>
    <span class="credit-by">by Hammer Creative LLC</span>
  </p>
</aside>

<a class="cta" href="https://github.com/HammerCreativeLLC/varkitekt/releases/latest" target="_blank" rel="noopener">
  <span>
    Download
    <span class="cta-sub">Windows · macOS coming soon</span>
  </span>
  <span class="cta-arrow">→</span>
</a>

<script>
/* ═════════════════════════════════════════════════════════════════════
   Skyline builder — sideways-skyline rows slide in and damp to a halt,
   signifying a folder tree snapping into place.
   ═════════════════════════════════════════════════════════════════════ */
(function(){
  const PALETTE = { fg: '#070316', edge: '#070316', win: 'rgba(255,255,255,0)' };

  function mulberry32(seed){
    return function(){
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  const ROW_SPECS = [
    { top: '0%',   h: '22%', dir: 'left'  },
    { top: '20%',  h: '18%', dir: 'right' },
    { top: '36%',  h: '20%', dir: 'left'  },
    { top: '54%',  h: '18%', dir: 'right' },
    { top: '70%',  h: '16%', dir: 'left'  },
    { top: '84%',  h: '18%', dir: 'right' },
  ];

  function makeBuilding(rand){
    const el = document.createElement('div');
    el.className = 'bldg';
    const w = 140 + Math.floor(rand() * 180);
    const hPct = 55 + Math.floor(rand() * 42);
    el.style.setProperty('--bw', w + 'px');
    el.style.setProperty('--bh', hPct + '%');

    const r = rand();
    if (r < 0.22) {
      el.classList.add('notch-top');
      const side = rand();
      el.classList.add(side < 0.4 ? 'nl' : (side < 0.75 ? 'nr' : 'nm'));
    } else if (r < 0.38) {
      const a = document.createElement('div');
      a.className = 'ant' + (rand() < 0.5 ? '' : ' off');
      el.appendChild(a);
    } else if (r < 0.48) {
      const d = document.createElement('div');
      d.className = 'dome';
      el.appendChild(d);
    } else if (r < 0.56) {
      const p = document.createElement('div');
      p.className = 'peak';
      p.style.setProperty('--pw', (10 + Math.floor(rand()*14)) + 'px');
      el.appendChild(p);
    }

    const rows = 2 + Math.floor(rand() * 3);
    const cols = 2 + Math.floor(rand() * 3);
    const winW = Math.max(10, Math.floor(w / (cols * 3)));
    const winH = Math.max(10, Math.floor(winW * (0.7 + rand() * 0.6)));
    const padX = Math.floor((w - cols * winW) / (cols + 1));
    const padY = 10 + Math.floor(rand() * 10);
    for (let rr=0; rr<rows; rr++){
      for (let c=0; c<cols; c++){
        if (rand() < 0.12) continue;
        const wn = document.createElement('div');
        wn.className = 'win';
        wn.style.left = (padX + c * (winW + padX)) + 'px';
        wn.style.top = (padY + rr * (winH + padY)) + 'px';
        wn.style.width = winW + 'px';
        wn.style.height = winH + 'px';
        el.appendChild(wn);
      }
    }
    if (rand() < 0.35) {
      const box = document.createElement('div');
      box.className = 'bldg';
      box.style.position = 'absolute';
      box.style.left = (20 + rand()*40) + '%';
      const bw = 16 + Math.floor(rand() * 26);
      const bh = 14 + Math.floor(rand() * 22);
      box.style.width = bw + 'px';
      box.style.height = bh + 'px';
      box.style.top = (-bh) + 'px';
      box.style.setProperty('--bh', '100%');
      el.appendChild(box);
    }
    return el;
  }

  function buildRow(spec, rand){
    const row = document.createElement('div');
    row.className = 'row ' + spec.dir;
    row.style.setProperty('--top', spec.top);
    row.style.setProperty('--h', spec.h);
    const strip = document.createElement('div');
    strip.className = 'strip';
    const count = 6 + Math.floor(rand() * 3);
    for (let i=0; i<count; i++) strip.appendChild(makeBuilding(rand));
    row.appendChild(strip);
    return row;
  }

  function animateRow(row, spec, rand){
    const dir = spec.dir === 'left' ? 1 : -1;
    const startOffset = -dir * (700 + Math.floor(rand() * 600));
    const duration = 3200 + rand() * 1800;
    const freq = 1.6 + rand() * 1.2;
    const damping = 2.4 + rand() * 0.8;
    const phaseDelay = rand() * 220;
    let t0 = null;
    function frame(t){
      if (t0 == null) t0 = t;
      const elapsed = (t - t0) - phaseDelay;
      if (elapsed < 0) {
        row.style.setProperty('--ix', startOffset + 'px');
        requestAnimationFrame(frame);
        return;
      }
      const tSec = elapsed / 1000;
      const decay = Math.exp(-damping * tSec);
      const wobble = Math.sin(2 * Math.PI * freq * tSec) * decay;
      const settle = startOffset * decay;
      const x = settle + wobble * 80 * dir;
      row.style.setProperty('--ix', x.toFixed(2) + 'px');
      if (elapsed < duration) requestAnimationFrame(frame);
      else row.style.setProperty('--ix', '0px');
    }
    requestAnimationFrame(frame);
  }

  function buildSkyline(container){
    container.style.setProperty('--fg', PALETTE.fg);
    container.style.setProperty('--edge', PALETTE.edge);
    container.style.setProperty('--win', PALETTE.win);

    const rand = mulberry32(2 * 9173 + 777);
    const rows = [];
    ROW_SPECS.forEach(spec => {
      const row = buildRow(spec, rand);
      container.appendChild(row);
      animateRow(row, spec, rand);
      rows.push(row);
    });

    const stage = container.parentElement;
    const winLayer = document.createElement('div');
    winLayer.className = 'skyline skyline-windows';
    winLayer.setAttribute('aria-hidden', 'true');
    stage.appendChild(winLayer);
    rows.forEach(row => {
      const clone = row.cloneNode(true);
      winLayer.appendChild(clone);
      const sync = () => {
        clone.style.setProperty('--ix', row.style.getPropertyValue('--ix') || '0px');
        if (clone.isConnected) requestAnimationFrame(sync);
      };
      requestAnimationFrame(sync);
    });
  }

  window.__buildSkyline = buildSkyline;
})();

/* ═════════════════════════════════════════════════════════════════════
   Liquid Metal shader — polished.
   ═════════════════════════════════════════════════════════════════════ */
(function(){
  const VERT = `
    attribute vec2 a_pos;
    void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;
  const FRAG = `
    precision highp float;
    uniform vec2 u_res;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform vec3 u_click;

    float metaball(vec2 p, vec2 c, float r){
      return r*r / max(0.0001, dot(p-c, p-c));
    }
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }

    void main(){
      vec2 uv = gl_FragCoord.xy / u_res.xy;
      vec2 p = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      vec2 m = (u_mouse*u_res - 0.5*u_res) / u_res.y;

      float t = u_time * 0.32;
      float s = 0.0;
      s += metaball(p, vec2(cos(t)*0.58, sin(t*1.3)*0.36), 0.24);
      s += metaball(p, vec2(cos(t*0.8+2.0)*0.68, sin(t*0.9+1.0)*0.42), 0.21);
      s += metaball(p, vec2(cos(t*1.2+4.0)*0.50, sin(t*0.6+3.0)*0.31), 0.19);
      s += metaball(p, vec2(cos(t*0.5+1.5)*0.72, sin(t*1.1+2.5)*0.34), 0.18);
      s += metaball(p, vec2(cos(t*0.9+5.0)*0.32, sin(t*0.7+0.5)*0.21), 0.16);
      s += metaball(p, vec2(cos(t*1.4+0.7)*0.42, sin(t*0.5+4.2)*0.26), 0.14);
      float breath = 1.0 + sin(u_time*0.8)*0.04;
      s += metaball(p, m, 0.30 * breath);

      float cAge = u_time - u_click.z;
      vec2 cp = (u_click.xy*u_res - 0.5*u_res) / u_res.y;
      float blast = exp(-cAge*1.6);
      s += metaball(p, cp, 0.38 * blast);

      float iso = smoothstep(1.0, 1.22, s);

      float gy = sin(s*2.8 + u_time*0.55) * 0.5 + 0.5;
      vec3 c1 = vec3(0.22, 0.08, 0.58);
      vec3 c2 = vec3(0.10, 0.78, 0.92);
      vec3 c3 = vec3(1.00, 0.38, 0.72);
      vec3 c4 = vec3(1.00, 0.82, 0.45);
      vec3 col = mix(c1, c2, gy);
      float core = smoothstep(1.5, 2.5, s);
      col = mix(col, c4, core * 0.7);
      float rim = smoothstep(0.82, 1.02, s) - smoothstep(1.02, 1.30, s);
      col = mix(col, c3, rim * 0.85);

      vec3 bg = mix(vec3(0.015,0.01,0.05), vec3(0.07,0.025,0.16), uv.y);
      float mv = length(uv - u_mouse);
      bg += vec3(0.05, 0.02, 0.1) * exp(-mv*3.0) * 0.4;
      col = mix(bg, col, iso);

      float streak1 = sin((p.x+p.y)*32.0 + s*4.0 + u_time*0.9);
      float streak2 = sin((p.x-p.y)*22.0 - s*3.0 + u_time*0.5);
      col += 0.09 * iso * smoothstep(0.9, 1.0, streak1);
      col += 0.05 * iso * smoothstep(0.88, 1.0, streak2);

      float glow = smoothstep(0.3, 1.0, s) * (1.0 - iso);
      col += glow * mix(vec3(0.25, 0.15, 0.5), vec3(0.1, 0.4, 0.55), gy) * 0.7;

      float cd = distance(p, cp);
      float ring = exp(-cAge*2.0) * smoothstep(0.03, 0.0, abs(cd - cAge*0.35));
      col += ring * vec3(1.0, 0.7, 0.9) * 1.2;

      col += (hash(gl_FragCoord.xy + u_time*0.1) - 0.5) * 0.012;
      col *= 1.0 - 0.35 * length(uv - 0.5);

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(gl, type, src){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(sh)); return null;
    }
    return sh;
  }
  function program(gl){
    const vs = compile(gl, gl.VERTEX_SHADER, VERT);
    const fs = compile(gl, gl.FRAGMENT_SHADER, FRAG);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(prog)); return null;
    }
    return prog;
  }

  window.__startShader = function(section){
    const canvas = section.querySelector('.shader-canvas');
    const gl = canvas.getContext('webgl', { antialias: true });
    if (!gl) return;
    const prog = program(gl);
    if (!prog) return;
    gl.useProgram(prog);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    const uRes = gl.getUniformLocation(prog, 'u_res');
    const uMouse = gl.getUniformLocation(prog, 'u_mouse');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uClick = gl.getUniformLocation(prog, 'u_click');

    const state = {
      mx: 0.5, my: 0.5,
      cx: 0.5, cy: 0.5, ct: -1000,
      t0: performance.now()/1000,
    };

    function resize(){
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      const r = canvas.getBoundingClientRect();
      const w = Math.max(2, Math.round(r.width * dpr));
      const h = Math.max(2, Math.round(r.height * dpr));
      if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function onMove(e){
      const r = canvas.getBoundingClientRect();
      state.mx = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
      state.my = Math.min(1, Math.max(0, 1 - (e.clientY - r.top) / r.height));
    }
    function onClick(e){
      const r = canvas.getBoundingClientRect();
      state.cx = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
      state.cy = Math.min(1, Math.max(0, 1 - (e.clientY - r.top) / r.height));
      state.ct = performance.now()/1000 - state.t0;
    }
    section.addEventListener('mousemove', onMove);
    section.addEventListener('click', onClick);
    section.addEventListener('touchmove', (e)=>{ if (e.touches[0]) onMove(e.touches[0]); }, { passive: true });
    section.addEventListener('touchstart', (e)=>{ if (e.touches[0]) onClick(e.touches[0]); }, { passive: true });
    window.addEventListener('resize', resize);
    resize();

    function render(){
      resize();
      const t = performance.now()/1000 - state.t0;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform2f(uMouse, state.mx, state.my);
      gl.uniform1f(uTime, t);
      gl.uniform3f(uClick, state.cx, state.cy, state.ct);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  };
})();

/* Init */
(function(){
  function init(){
    const stage = document.querySelector('.stage');
    const skyline = stage.querySelector('.skyline');
    window.__buildSkyline(skyline);
    window.__startShader(stage);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
